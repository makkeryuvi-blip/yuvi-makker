<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple Profile Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>


      body {
        background-color: gray;
      }

      .container {
        width: 75%;
        max-width: fit-content;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;       
        text-align: center;
      }

      .profile-img {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        object-fit: cover;       
        margin: 15px 0px;
      }

      h1 {
        margin: 10px 0 5px;
        font-size: 22px;
      }

      p {
        color: gray;
        font-size: 14px;
        margin-bottom: 15px;
      }

      .btn {
      
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        background-color: #202040;
        color: white;
        cursor: pointer;
        font-size: 14px;
      }
      a {
        text-decoration: none;
        color: white;
      }

      .btn:hover {
        background-color: #404070;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Satyaansh Softech Pvt. Ltd.</h1>
        <img src="sir.jpeg" alt="Profile Image" class="profile-img" />

      <h1>Satyawan Panchal</h1>
      <p>Founder & CEO</p> 
      <p>Web Developer | Corporate Trainer</p>
      

      <button class="btn">
        <a
          href="https://www.instagram.com/satyaanshsoftech?utm_source=qr&igsh=MXkybnFoaGszb2huaw%3D%3D"
          >Follow</a
        >
      </button>
      <button class="btn">
        <a href="https://www.linkedin.com/company/satyaansh-softech-pvt-ltd/"
          >LinkedIn</a
        >
      </button>
      <p> Contact: +91-7082252235</p>
    </div>
  </body>
</html>
